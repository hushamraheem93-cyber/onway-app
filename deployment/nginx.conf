# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# OnWay — Nginx Reverse Proxy Configuration (Example)
#
# This is an EXAMPLE file only. Do NOT deploy it automatically.
# Instructions:
#   1. Copy to /etc/nginx/sites-available/onway
#   2. Replace every occurrence of YOUR_DOMAIN with your actual domain
#   3. Run: sudo ln -s /etc/nginx/sites-available/onway /etc/nginx/sites-enabled/
#   4. Run: sudo nginx -t && sudo systemctl reload nginx
#   5. Obtain SSL: sudo certbot --nginx -d YOUR_DOMAIN
#   6. After certbot, it will update this file automatically with SSL settings
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ── Rate limiting zone (shared across all workers) ────────────────────────────
limit_req_zone $binary_remote_addr zone=onway_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=onway_login:10m rate=5r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Let's Encrypt / Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — main application ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ── SSL (managed by Certbot — do not edit manually) ───────────────────
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Client body size (file uploads) ───────────────────────────────────
    client_max_body_size 20M;

    # ── Gzip compression ──────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css
               application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Static files served by Express (uploads, static-build) ───────────
    # Express already serves /uploads and /static-build directly.
    # Uncomment the block below if you want Nginx to serve them instead
    # (faster, no Node.js overhead):
    #
    # location /uploads/ {
    #     alias /var/www/onway/uploads/;
    #     expires 7d;
    #     add_header Cache-Control "public, immutable";
    # }
    #
    # location /static-build/ {
    #     alias /var/www/onway/static-build/;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }

    # ── Admin login — strict rate limit ──────────────────────────────────
    location = /api/admin/login {
        limit_req zone=onway_login burst=3 nodelay;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/proxy_params;
    }

    # ── API — standard rate limit ─────────────────────────────────────────
    location /api/ {
        limit_req zone=onway_api burst=60 nodelay;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/proxy_params;
    }

    # ── Socket.io (WebSocket + long-polling) ──────────────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000;

        # WebSocket upgrade
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep long-polling connections alive
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_connect_timeout 75s;
    }

    # ── Everything else → Node.js ─────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/proxy_params;
    }
}
