<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول — لوحة التحكم</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #E86520, #FF8C4B);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 32px;
      box-shadow: 0 8px 24px rgba(232, 101, 32, 0.4);
    }

    .logo h1 {
      color: #ffffff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo p {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #ffffff;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      text-align: right;
    }

    input:focus {
      border-color: #E86520;
      background: rgba(232,101,32,0.08);
    }

    input::placeholder { color: rgba(255,255,255,0.3); }

    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #E86520, #FF8C4B);
      border: none;
      border-radius: 12px;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 16px rgba(232,101,32,0.4);
    }

    .btn:hover { opacity: 0.92; }
    .btn:active { transform: scale(0.98); }

    .error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      color: #fca5a5;
      font-size: 13px;
      padding: 12px 14px;
      margin-bottom: 18px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/uploads/onway-logo.png" alt="OnWay" style="width:90px;height:90px;border-radius:24px;object-fit:cover;margin:0 auto 16px;display:block;box-shadow:0 8px 24px rgba(232,101,32,0.35);" />
      <h1>OnWay</h1>
      <p>لوحة التحكم</p>
    </div>

    ERROR_PLACEHOLDER

    <form method="POST" action="/admin/login">
      <div class="form-group">
        <label>اسم المستخدم</label>
        <input type="text" name="username" placeholder="أدخل اسم المستخدم" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" name="password" placeholder="أدخل كلمة المرور" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn">دخول</button>
    </form>
  </div>
</body>
</html>
