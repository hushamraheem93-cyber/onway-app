<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnWay — بوابة الشركاء</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', 'Cairo', Tahoma, sans-serif;
    background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #111 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    right: -30%;
    width: 80vw;
    height: 80vw;
    background: radial-gradient(circle, rgba(232,101,32,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 40px;
    width: 100%;
    max-width: 480px;
    backdrop-filter: blur(20px);
    position: relative;
    z-index: 1;
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, #E86520, #f5a623);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
    font-size: 28px;
    color: #fff;
    font-weight: 900;
    box-shadow: 0 8px 32px rgba(232,101,32,0.4);
  }

  .logo h1 { color: #fff; font-size: 1.6rem; font-weight: 800; }
  .logo p { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-top: 4px; }

  .tabs {
    display: flex;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 28px;
    gap: 4px;
  }

  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.5);
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    direction: rtl;
  }

  .tab.active {
    background: #E86520;
    color: #fff;
    box-shadow: 0 2px 12px rgba(232,101,32,0.4);
  }

  .form-section { display: none; }
  .form-section.active { display: block; }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    color: rgba(255,255,255,0.7);
    font-size: 0.82rem;
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    padding: 12px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: #fff;
    font-size: 0.9rem;
    font-family: inherit;
    direction: rtl;
    transition: border-color 0.2s, background 0.2s;
    outline: none;
    appearance: none;
  }

  .form-group input:focus,
  .form-group select:focus {
    border-color: #E86520;
    background: rgba(232,101,32,0.08);
  }

  .form-group input::placeholder { color: rgba(255,255,255,0.3); }

  .form-group select option { background: #1a1a1a; color: #fff; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #E86520, #f0832e);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    font-family: inherit;
    box-shadow: 0 4px 20px rgba(232,101,32,0.35);
  }

  .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(232,101,32,0.5); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .alert {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 0.875rem;
    margin-bottom: 16px;
    display: none;
    line-height: 1.5;
  }
  .alert.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; display: block; }
  .alert.success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; display: block; }

  .divider {
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 0.8rem;
    margin: 20px 0 0;
  }

  .pending-notice {
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    color: #fcd34d;
    font-size: 0.88rem;
    line-height: 1.6;
    display: none;
  }

  @media (max-width: 480px) {
    .card { padding: 28px 20px; }
    .row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">O</div>
    <h1>OnWay Partners</h1>
    <p>بوابة الشركاء والمتاجر</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">تسجيل الدخول</button>
    <button class="tab" onclick="switchTab('register')">تسجيل متجر جديد</button>
  </div>

  <!-- LOGIN FORM -->
  <div id="login-section" class="form-section active">
    <div id="login-alert" class="alert"></div>
    <div id="login-pending" class="pending-notice">
      ⏳ حسابك قيد المراجعة<br>
      <small>سيتم إشعارك عند الموافقة على طلبك. عادةً خلال 24 ساعة.</small>
    </div>
    <div class="form-group">
      <label>رقم الهاتف</label>
      <input type="tel" id="login-phone" placeholder="07xxxxxxxxx" />
    </div>
    <div class="form-group">
      <label>كلمة المرور</label>
      <input type="password" id="login-password" placeholder="••••••••" />
    </div>
    <button class="btn" id="login-btn" onclick="doLogin()">دخول</button>
  </div>

  <!-- REGISTER FORM -->
  <div id="register-section" class="form-section">
    <div id="register-alert" class="alert"></div>
    <div class="row">
      <div class="form-group">
        <label>اسم المتجر <span style="color:#E86520">*</span></label>
        <input type="text" id="reg-storeName" placeholder="مطعم النخيل" />
      </div>
      <div class="form-group">
        <label>اسم صاحب المتجر <span style="color:#E86520">*</span></label>
        <input type="text" id="reg-ownerName" placeholder="أحمد محمد" />
      </div>
    </div>
    <div class="form-group">
      <label>نوع النشاط التجاري <span style="color:#E86520">*</span></label>
      <select id="reg-businessType">
        <option value="">اختر نوع النشاط</option>
        <option value="restaurant">مطعم / وجبات</option>
        <option value="supermarket">سوبرماركت / بقالة</option>
        <option value="pharmacy">صيدلية</option>
        <option value="bakery">مخبز / حلويات</option>
        <option value="other">أخرى</option>
      </select>
    </div>
    <div class="row">
      <div class="form-group">
        <label>رقم الهاتف <span style="color:#E86520">*</span></label>
        <input type="tel" id="reg-phone" placeholder="07xxxxxxxxx" />
      </div>
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="reg-email" placeholder="example@mail.com" />
      </div>
    </div>
    <div class="form-group">
      <label>العنوان</label>
      <input type="text" id="reg-address" placeholder="بغداد، المنصور، شارع..." />
    </div>
    <div class="row">
      <div class="form-group">
        <label>كلمة المرور <span style="color:#E86520">*</span></label>
        <input type="password" id="reg-password" placeholder="6 أحرف على الأقل" />
      </div>
      <div class="form-group">
        <label>تأكيد كلمة المرور <span style="color:#E86520">*</span></label>
        <input type="password" id="reg-password2" placeholder="أعد كتابة كلمة المرور" />
      </div>
    </div>
    <button class="btn" id="register-btn" onclick="doRegister()">إرسال طلب الانضمام</button>
    <div class="divider" style="margin-top:16px;font-size:0.78rem;">
      سيراجع الفريق طلبك ويردّ عليك خلال 24 ساعة
    </div>
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
  });
  document.getElementById('login-section').classList.toggle('active', tab === 'login');
  document.getElementById('register-section').classList.toggle('active', tab === 'register');
}

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert ' + type;
}

async function doLogin() {
  const phone = document.getElementById('login-phone').value.trim();
  const password = document.getElementById('login-password').value;
  if (!phone || !password) return showAlert('login-alert', 'يرجى إدخال رقم الهاتف وكلمة المرور', 'error');

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'جارٍ التحقق...';
  document.getElementById('login-pending').style.display = 'none';
  document.getElementById('login-alert').className = 'alert';

  try {
    const res = await fetch('/api/vendor/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phoneNumber: phone, password }),
      credentials: 'include',
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/vendor/dashboard';
    } else if (res.status === 403 && data.error && data.error.includes('قيد المراجعة')) {
      document.getElementById('login-pending').style.display = 'block';
    } else {
      showAlert('login-alert', data.error || 'حدث خطأ', 'error');
    }
  } catch {
    showAlert('login-alert', 'تعذر الاتصال بالخادم', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'دخول';
  }
}

async function doRegister() {
  const storeName = document.getElementById('reg-storeName').value.trim();
  const ownerName = document.getElementById('reg-ownerName').value.trim();
  const businessType = document.getElementById('reg-businessType').value;
  const phoneNumber = document.getElementById('reg-phone').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const address = document.getElementById('reg-address').value.trim();
  const password = document.getElementById('reg-password').value;
  const password2 = document.getElementById('reg-password2').value;

  if (!storeName || !ownerName || !businessType || !phoneNumber || !password) {
    return showAlert('register-alert', 'يرجى ملء جميع الحقول المطلوبة', 'error');
  }
  if (password !== password2) {
    return showAlert('register-alert', 'كلمتا المرور غير متطابقتان', 'error');
  }
  if (password.length < 6) {
    return showAlert('register-alert', 'كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
  }

  const btn = document.getElementById('register-btn');
  btn.disabled = true;
  btn.textContent = 'جارٍ الإرسال...';
  document.getElementById('register-alert').className = 'alert';

  try {
    const res = await fetch('/api/vendor/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ storeName, ownerName, businessType, phoneNumber, email, address, password }),
    });
    const data = await res.json();
    if (res.ok) {
      showAlert('register-alert', '✅ ' + data.message, 'success');
      setTimeout(() => switchTab('login'), 3000);
    } else {
      showAlert('register-alert', data.error || 'حدث خطأ', 'error');
    }
  } catch {
    showAlert('register-alert', 'تعذر الاتصال بالخادم', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'إرسال طلب الانضمام';
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (document.getElementById('login-section').classList.contains('active')) doLogin();
    else doRegister();
  }
});
</script>
</body>
</html>
